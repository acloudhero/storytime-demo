# StoryTime Phase 10F demo fixture — Completed-After-Rerun Scenario
#
# Fixture definition: a description and expected-state record. It is not a
# generated runtime artifact and it does not bypass the real pipeline.

scenario_id: STF-10F-06
scenario_name: completed-after-rerun
phase: "10F"

purpose: >-
  Demonstrate the full recovery path: a failed eligible run is re-run, resumed,
  and completed, with the whole journey preserved on the append-only audit
  record. This is the end-to-end story the operator demo closes on.

input_files:
  - demo/seed/demo-retryable-failure.json
  - demo/seed/demo-retryable-failure.txt

content:
  - title: The Ferryman's Lantern
    source_id: demo-retryable-failure
    license_type: CC0-1.0
    license_basis: >-
      Original text written for StoryTime demo fixtures and dedicated to the
      public domain under CC0-1.0. License deed:
      https://creativecommons.org/publicdomain/zero/1.0/
    author: StoryTime Demo Fixtures (generated-by-project original text)
    allowed_use: Local demonstration of the StoryTime recovery path.
    attribution_required: false
    commercial_use_allowed: true
    governance_expected_decision: APPROVED

expected_governance_decision: APPROVED
expected_run_state: completed

expected_report_behavior: >-
  The run shows run status completed. The same detail page that earlier
  carried a failure summary now shows a completed run; the audit record below
  it still preserves the earlier failure and the re-run request.

expected_queue_behavior: >-
  The run no longer appears in the failure / review queue: a completed run is
  not surfaced by storytime queue.

expected_rerun_eligibility: >-
  Not applicable once completed. storytime rerun reports 'not_retryable_status'
  for a completed run.

expected_audit_behavior: >-
  The append-only event log preserves the entire journey in order — the
  failure (RunFailed), the re-run request (RunRerunRequested), and the
  recovered completion (AssemblyCompleted, RSSPublished, RunCompleted).
  Auditability is preserved: nothing is rewritten or erased.

commands:
  - "uv run storytime rerun <run-id>          # from the failed run in STF-10F-02 / STF-10F-05"
  - "uv run storytime run --resume <run-id>"
  - "uv run storytime status <run-id>"
  - "uv run storytime report generate"

expected_next_operator_action: >-
  Open operator-report/index.html and confirm the run is completed, then read
  the run's event list to show the failure, the re-run request, and the
  recovered completion all on one audit record. This is the natural closing
  beat of the operator demo.

reproduction: >-
  This scenario continues from fixtures STF-10F-02 and STF-10F-05 and reuses
  their seed and manifest. After the re-run reset (STF-10F-05), run storytime
  run --resume <run-id> in an environment where ffmpeg is available again, so
  the assemble stage that failed before now succeeds. The expected_run_state
  above is the documented expected end state, not a checked-in generated run.
  The recovery uses only existing pipeline commands; nothing about re-run or
  resume behaviour is changed.

limitations: >-
  Recovery depends on the original failure being transient — here, ffmpeg
  being available on the resume that previously failed for its absence. A
  permanent fault would fail again on resume; re-run does not repair the
  environment, it only makes a failed run resumable.
